apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: musicalement-app
  namespace: musicalement
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: musicalement-app
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: musicalement/app
