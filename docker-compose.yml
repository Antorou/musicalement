services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: musicalement
      POSTGRES_USER: musicalement
      POSTGRES_PASSWORD: musicalement
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: backend/
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: musicalement.settings.local
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: backend/
    command: celery -A musicalement worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: musicalement.settings.local
    depends_on:
      - db
      - redis

  beat:
    build: backend/
    command: celery -A musicalement beat -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: musicalement.settings.local
    deploy:
      replicas: 1
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: frontend/
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

volumes:
  postgres_data:
