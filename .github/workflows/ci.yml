name: CI

on:
  push:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache backend image layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: buildx-

      - name: Create empty .env
        run: touch .env

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          load: true
          tags: musicalement-web:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache backend image layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: buildx-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Create empty .env
        run: touch .env

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          load: true
          tags: musicalement-web:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run lint
        run: make lint

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: eu-west-3
      ECR_BACKEND: 277229631415.dkr.ecr.eu-west-3.amazonaws.com/musicalement-backend
      ECR_FRONTEND: 277229631415.dkr.ecr.eu-west-3.amazonaws.com/musicalement-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::277229631415:role/musicalement-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin \
              277229631415.dkr.ecr.eu-west-3.amazonaws.com

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: true
          tags: ${{ env.ECR_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          target: runtime
          push: true
          tags: ${{ env.ECR_FRONTEND }}:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name musicalement --region $AWS_REGION

      - name: Helm deploy
        run: |
          helm upgrade --install musicalement infra/helm/musicalement \
            -n musicalement --create-namespace \
            --set image.repository=$ECR_BACKEND \
            --set image.tag=${{ github.sha }} \
            --set frontend.image.repository=$ECR_FRONTEND \
            --set frontend.image.tag=${{ github.sha }} \
            --set ingress.enabled=true \
            --timeout 180s \
            --atomic
